apiVersion: v1
kind: ConfigMap

metadata:
  name: gateway-config
  namespace: cloudcart

data:
  NODE_ENV: "production"

  PORT: "4000"

  AUTH_SERVICE_URL: "http://auth:4001"

  PRODUCT_SERVICE_URL: "http://product:4002"

  CART_SERVICE_URL: "http://cart:4003"

  ORDER_SERVICE_URL: "http://order:4004"

  PAYMENT_SERVICE_URL: "http://payment:4005"

  REDIS_URL: "redis://redis:6379"

  CORS_ORIGIN: "*"

  RATE_LIMIT_WINDOW_MS: "900000"

  RATE_LIMIT_MAX: "100"

  AUTH_RATE_LIMIT_MAX: "10"
